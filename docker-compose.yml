name: vigil

services:
  collector:
    build:
      context: .
      dockerfile: services/collector/Dockerfile
    image: vigil-collector
    ports:
      - "9090:9090"
      - "2112:2112"
    depends_on:
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      - KAFKA_ADDR=kafka:9092
      - METRICS_ADDR=:2112
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: services/agent/Dockerfile
    image: vigil-agent
    hostname: honnek-G5-GE
    depends_on:
      - collector
      - jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_ADDR=collector:9090
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317

  storage:
    build:
      context: .
      dockerfile: services/storage/Dockerfile
    image: vigil-storage
    ports:
      - "9091:9091"
      - "2113:2112"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      - POSTGRES_DSN=postgres://vigil:secret@postgres:5432/vigil?sslmode=disable
      - REDIS_ADDR=redis:6379
      - METRICS_ADDR=:2112
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    restart: unless-stopped

  processor:
    build:
      context: .
      dockerfile: services/processor/Dockerfile
    image: vigil-processor
    ports:
      - "2115:2112"
    depends_on:
      kafka:
        condition: service_healthy
      storage:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      - KAFKA_ADDR=kafka:9092
      - STORAGE_ADDR=storage:9091
      - METRICS_ADDR=:2112
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    restart: unless-stopped

  alerter:
    build:
      context: .
      dockerfile: services/alerter/Dockerfile
    image: vigil-alerter
    ports:
      - "2116:2112"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - KAFKA_ADDR=kafka:9092
      - REDIS_ADDR=redis:6379
      - METRICS_ADDR=:2112
    restart: unless-stopped

  notifier:
    build:
      context: .
      dockerfile: services/notifier/Dockerfile
    image: vigil-notifier
    ports:
      - "2117:2112"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_ADDR=kafka:9092
      - METRICS_ADDR=:2112
    env_file:
      - .env
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: vigil-api
    ports:
      - "8080:8080"
      - "2114:2112"
    depends_on:
      storage:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      - STORAGE_ADDR=storage:9091
      - API_ADDR=:8080
      - REDIS_ADDR=redis:6379
      - METRICS_ADDR=:2112
    env_file:
      - .env
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=vigil
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=vigil
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigil -d vigil"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:latest
    restart: unless-stopped
    environment:
      # KRaft: один узел совмещает роли брокера и контроллера (без Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # слушатели: PLAINTEXT — для клиентов, CONTROLLER — внутренний кворум
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # одиночный узел → фактор репликации служебных топиков = 1 (дефолт 3 не стартует)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9099:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # Web UI
      - "4317:4317"     # OTLP gRPC — сюда сервисы шлют трейсы
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  promdata:
  grafanadata:
