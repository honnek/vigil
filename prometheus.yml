global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: vigil-collector
    static_configs:
      - targets: ["collector:2112"]

  - job_name: vigil-storage
    static_configs:
      - targets: ["storage:2112"]