global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: vigil-collector
    static_configs:
      - targets: ["collector:2112"]

  - job_name: vigil-storage
    static_configs:
      - targets: ["storage:2112"]

  - job_name: vigil-api
    static_configs:
      - targets: [ "api:2112"]

  - job_name: vigil-processor
    static_configs:
      - targets: [ "processor:2112" ]

  - job_name: vigil-alerter
    static_configs:
      - targets: [ "alerter:2112" ]

  - job_name: vigil-notifier
    static_configs:
      - targets: [ "notifier:2112" ]

