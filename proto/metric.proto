syntax = "proto3";

package metric;

option go_package = "github.com/honnek/vigil/proto;metric";

import "google/protobuf/timestamp.proto";


enum MetricType {
  METRIC_TYPE_UNSPECIFIED = 0;
  METRIC_TYPE_CPU = 1;
  METRIC_TYPE_RAM = 2;
  METRIC_TYPE_DISK = 3;
}

message Metric {
  string host = 1;
  google.protobuf.Timestamp timestamp = 2;
  MetricType type = 3;
  double value = 4;
  map<string, string> labels = 5;
  string name = 6;
}

message StreamSummary {
  int64 received = 1;
  int64 rejected = 2;
}

service MetricsService {
  rpc StreamMetrics(stream Metric) returns (StreamSummary);
}


